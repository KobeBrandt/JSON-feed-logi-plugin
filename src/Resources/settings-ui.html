<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Article URL Settings</title>
</head>
<body>
    <div class='container'>
        <h1>Article URL Settings</h1>
        
        <div class='info-box'>
            <p><strong>Note:</strong> Add your URLs below. These will be saved to a configuration file.</p>
        </div>
        
        <div class='form-group'>
            <label>URLs:</label>
            <div id='urlList' class='url-list'></div>
            <button class='add-btn' onclick='addUrl()'>+ Add Named URL</button>
        </div>
        
        <button class='save-btn' onclick='saveSettings()'>Save Settings</button>
        <div id='status' class='status' style='display:none;'></div>
    </div>
    
    <script>
        let namedUrls = [];
        let articleUrls = [];
        
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                if (response.ok) {
                    const data = await response.json();
                    namedUrls = data.namedUrls || [];
                    articleUrls = data.articleUrls || [];
                    renderUrlList();
                }
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }
        
        function renderUrlList() {
            const container = document.getElementById('urlList');
            container.innerHTML = '';
            namedUrls.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'url-item';
                div.innerHTML = `
                    <input type='text' name='name' value='${escapeHtml(item.name || '')}' onchange='updateUrl(${index}, "name", this.value)' placeholder='Folder name' />
                    <input type='url' name='url' value='${escapeHtml(item.url || '')}' onchange='updateUrl(${index}, "url", this.value)' placeholder='https://example.com' />
                    <button onclick='removeUrl(${index})'>Remove</button>
                `;
                container.appendChild(div);
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addUrl() {
            namedUrls.push({ name: '', url: '' });
            renderUrlList();
        }
        
        function updateUrl(index, field, value) {
            if (!namedUrls[index]) {
                namedUrls[index] = { name: '', url: '' };
            }
            namedUrls[index][field] = value;
        }
        
        function removeUrl(index) {
            namedUrls.splice(index, 1);
            renderUrlList();
        }
        
        async function saveSettings() {
            const status = document.getElementById('status');
            status.style.display = 'none';
            
            // Filter out empty entries
            const filteredUrls = namedUrls.filter(item => 
                item && (item.name?.trim() || item.url?.trim())
            ).map(item => ({
                name: item.name?.trim() || 'Untitled',
                url: item.url?.trim() || ''
            }));
            
            const payload = {
                articleUrls: articleUrls,
                namedUrls: filteredUrls
            };
            
            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    status.textContent = 'Settings saved successfully! Restart the Logi Plugin service for this to take effect';
                    status.className = 'status success';
                    status.style.display = 'block';
                    setTimeout(() => status.style.display = 'none', 5000);
                } else {
                    const error = await response.json();
                    status.textContent = 'Error: ' + (error.error || 'Failed to save');
                    status.className = 'status error';
                    status.style.display = 'block';
                }
            } catch (error) {
                status.textContent = 'Error: ' + error.message;
                status.className = 'status error';
                status.style.display = 'block';
            }
        }
        
        loadSettings();
    </script>
</body>
<style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        margin: 0; 
        padding: 20px; 
        background: #191919; 
    }
    .container { 
        max-width: 800px; 
        margin: 0 auto;
        padding: 20px;
    }
    h1 { color: #deecfb; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; color: #deecfb; }
    input[type='text'], input[type='url'] { width: 100%; padding: 10px; border: 1px solid #03dbc3; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    input[type='text']:focus, input[type='url']:focus { outline: none; border-color: #4a90e2; }
    .url-list { margin: 20px 0; }
    .url-item { display: flex; margin-bottom: 10px; gap: 10px; }
    .url-item input { flex: 1; }
    .url-item input[name='name'] { flex: 0 0 200px; }
    .url-item button { padding: 10px 15px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .url-item button:hover { background: #8a0000; }
    button.add-btn { background: #03dbc3; color: black; padding: 6px 12px; border: none; border-radius: 4px; font-size: 10px; cursor: pointer; }
    button.add-btn:hover { background: #8f66fa; }
    button.save-btn { background: #03dbc3; color: black; padding: 12px 24px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    button.save-btn:hover { background: #8f66fa; }
    .status { margin-top: 20px; padding: 10px; border-radius: 4px; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    .info-box { background: #e3f2fd; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #2196f3; }
</style>
</html>
