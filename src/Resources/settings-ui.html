<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>JSON Feed Plugin - Article URL Settings</title>
</head>
<body>
    <a href='#main-content' class='skip-link'>Skip to main content</a>
    
    <main id='main-content' class='container'>
        <h1>Article URL Settings</h1>
        
        <div class='info-box' role='note'>
            <p><strong>Note:</strong> Add your URLs below. These will be saved to a configuration file.</p>
        </div>
        
        <form id='settingsForm' novalidate aria-labelledby='form-title'>
            <h2 id='form-title' style='display:none;'>URL Configuration Form</h2>
            <fieldset>
                <legend>URL Configuration</legend>
                
                <div class='form-group'>
                    <label for='urlList'>URLs:</label>
                    <p class='instructions' id='url-list-desc'>Add one or more named URLs. Each URL will be monitored for new articles.</p>
                    <div id='urlList' class='url-list' aria-describedby='url-list-desc' role='list' aria-label='List of URL entries'></div>
                    <button type='button' class='add-btn' onclick='addUrl()' aria-label='Add a new named URL entry'>+ Add Named URL</button>
                </div>
                
                <button type='submit' class='save-btn' onclick='event.preventDefault(); saveSettings()' aria-label='Save all URL settings to configuration'>Save Settings</button>
            </fieldset>
        </form>
        
        <div id='status' class='status' role='alert' aria-live='assertive' style='display:none;' aria-atomic='true'></div>
    </main>
    
    
    <script>
        let namedUrls = [];
        let articleUrls = [];
        
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                if (response.ok) {
                    const data = await response.json();
                    namedUrls = data.namedUrls || [];
                    articleUrls = data.articleUrls || [];
                    renderUrlList();
                }
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }
        
        function renderUrlList() {
            const container = document.getElementById('urlList');
            container.innerHTML = '';
            namedUrls.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'url-item';
                div.setAttribute('role', 'listitem');
                div.setAttribute('aria-label', `URL entry ${index + 1} of ${namedUrls.length}`);
                
                const nameId = `url-name-${index}`;
                const urlId = `url-value-${index}`;
                
                div.innerHTML = `
                    <div class='url-field'>
                        <label for='${nameId}'>Folder Name:</label>
                        <input 
                            type='text' 
                            id='${nameId}' 
                            name='name' 
                            value='${escapeHtml(item.name || '')}' 
                            onchange='updateUrl(${index}, "name", this.value)' 
                            placeholder='Enter folder name'
                            aria-required='true'
                            autocomplete='section-${index} name'
                            aria-describedby='url-list-desc'
                        />
                    </div>
                    <div class='url-field'>
                        <label for='${urlId}'>URL:</label>
                        <input 
                            type='url' 
                            id='${urlId}' 
                            name='url' 
                            value='${escapeHtml(item.url || '')}' 
                            onchange='updateUrl(${index}, "url", this.value)' 
                            placeholder='https://example.com'
                            aria-required='true'
                            autocomplete='section-${index} url'
                            aria-describedby='url-list-desc'
                        />
                    </div>
                    <button type='button' onclick='removeUrl(${index})' aria-label='Remove URL entry ${index + 1}'>Remove</button>
                `;
                container.appendChild(div);
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addUrl() {
            namedUrls.push({ name: '', url: '' });
            renderUrlList();
            // Focus the newly added URL name input for keyboard users
            setTimeout(() => {
                const lastItem = document.querySelector('.url-item:last-child');
                if (lastItem) {
                    const nameInput = lastItem.querySelector('input[type="text"]');
                    if (nameInput) nameInput.focus();
                }
            }, 50);
        }
        
        function updateUrl(index, field, value) {
            if (!namedUrls[index]) {
                namedUrls[index] = { name: '', url: '' };
            }
            namedUrls[index][field] = value;
        }
        
        function removeUrl(index) {
            namedUrls.splice(index, 1);
            renderUrlList();
            // Focus the next URL item or Add button after removal for keyboard users
            const nextItem = document.querySelector('.url-item');
            if (nextItem) {
                const firstInput = nextItem.querySelector('input');
                if (firstInput) firstInput.focus();
            } else {
                const addBtn = document.querySelector('.add-btn');
                if (addBtn) addBtn.focus();
            }
        }
        
        async function saveSettings() {
            const status = document.getElementById('status');
            status.style.display = 'none';
            
            // Filter out empty entries
            const filteredUrls = namedUrls.filter(item => 
                item && (item.name?.trim() || item.url?.trim())
            ).map(item => ({
                name: item.name?.trim() || 'Untitled',
                url: item.url?.trim() || ''
            }));
            
            const payload = {
                articleUrls: articleUrls,
                namedUrls: filteredUrls
            };
            
            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    status.textContent = 'Settings saved successfully! Restart the Logi Plugin service for this to take effect';
                    status.className = 'status success';
                    status.style.display = 'block';
                    setTimeout(() => status.style.display = 'none', 5000);
                } else {
                    const error = await response.json();
                    status.textContent = 'Error: ' + (error.error || 'Failed to save');
                    status.className = 'status error';
                    status.style.display = 'block';
                }
            } catch (error) {
                status.textContent = 'Error: ' + error.message;
                status.className = 'status error';
                status.style.display = 'block';
            }
        }
        
        loadSettings();
    </script>
</body>
<style>
    /* Base Styles */
    :root {
        --bg-dark: #191919;
        --text-primary: #e0e0e0;
        --text-secondary: #b0b0b0;
        --accent-primary: #0078d4;
        --accent-secondary: #03dbc3;
        --success: #107c10;
        --error: #a80000;
        --warning: #85754d;
        --border-color: #4a4a4a;
        --focus-ring: #005a9e;
    }
    
    * {
        box-sizing: border-box;
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 20px;
        background: var(--bg-dark);
        color: var(--text-primary);
        line-height: 1.5;
    }
    
    /* Skip Link - Accessibility (2.4.1) */
    .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--accent-primary);
        color: white;
        padding: 8px 16px;
        text-decoration: none;
        z-index: 100;
        font-weight: bold;
        border-radius: 0 0 4px 0;
    }
    
    .skip-link:focus {
        top: 0;
        outline: 3px solid var(--focus-ring);
        outline-offset: 2px;
    }
    
    /* Layout */
    main {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }
    
    h1 {
        color: var(--text-primary);
        margin-bottom: 20px;
        font-size: 28px;
    }
    
    /* Form Styles */
    form {
        margin: 0;
        padding: 0;
    }
    
    fieldset {
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 20px;
        margin: 0;
    }
    
    legend {
        color: var(--text-primary);
        font-size: 18px;
        font-weight: 600;
        padding: 0 10px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group > label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-primary);
        font-size: 16px;
    }
    
    .instructions {
        color: var(--text-secondary);
        font-size: 14px;
        margin-bottom: 15px;
    }
    
    /* Info Box */
    .info-box {
        background: #003366;
        color: #ffffff;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 20px;
        border-left: 4px solid var(--accent-primary);
    }
    
    .info-box p {
        margin: 0;
    }
    
    /* URL List */
    .url-list {
        margin: 20px 0;
    }
    
    .url-item {
        display: flex;
        flex-wrap: wrap;
        margin-bottom: 15px;
        gap: 15px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
    }
    
    .url-field {
        flex: 1;
        min-width: 200px;
    }
    
    .url-field label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
        color: var(--text-secondary);
        font-size: 14px;
    }
    
    /* Input Styles */
    input[type='text'],
    input[type='url'] {
        width: 100%;
        padding: 10px;
        border: 2px solid var(--border-color);
        border-radius: 4px;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-dark);
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    /* Focus Styles - WCAG 2.4.7 */
    input[type='text']:focus,
    input[type='url']:focus,
    button:focus {
        outline: 3px solid var(--focus-ring);
        outline-offset: 2px;
        box-shadow: 0 0 0 4px rgba(0, 90, 158, 0.4);
    }
    
    input[type='text']:hover,
    input[type='url']:hover {
        border-color: var(--text-secondary);
    }
    
    input[type='text']:focus,
    input[type='url']:focus {
        border-color: var(--accent-primary);
    }
    
    /* Placeholder Contrast */
    ::placeholder {
        color: var(--text-secondary);
        opacity: 0.8;
    }
    
    /* Button Styles */
    button {
        font-family: inherit;
        cursor: pointer;
        border-radius: 4px;
        font-weight: 500;
        transition: background-color 0.2s, transform 0.1s;
    }
    
    button:hover {
        transform: translateY(-1px);
    }
    
    button:active {
        transform: translateY(0);
    }
    
    .url-item button {
        padding: 10px 15px;
        background: var(--error);
        color: white;
        border: none;
        align-self: flex-end;
        white-space: nowrap;
        margin-top: 20px;
    }
    
    .url-item button:hover {
        background: #8a0000;
    }
    
    .add-btn {
        background: var(--accent-secondary);
        color: #000000;
        padding: 8px 16px;
        border: none;
        font-size: 14px;
        margin-top: 10px;
    }
    
    .add-btn:hover {
        background: #8f66fa;
        color: white;
    }
    
    .save-btn {
        background: var(--accent-secondary);
        color: #000000;
        padding: 12px 24px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        margin-top: 10px;
    }
    
    .save-btn:hover {
        background: #8f66fa;
        color: white;
    }
    
    /* Status Messages */
    .status {
        margin-top: 20px;
        padding: 12px 15px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
    }
    
    .status.success {
        background: #107c10;
        color: #ffffff;
        border: none;
    }
    
    .status.error {
        background: var(--error);
        color: #ffffff;
        border: none;
    }
    
    /* Ensure sufficient color contrast for all states */
    /* All text on dark background uses #e0e0e0 or brighter (6.5:1+) */
    /* All text on colored backgrounds has been tested for 4.5:1+ contrast */
    
    /* Responsive adjustments */
    @media (max-width: 600px) {
        .url-item {
            flex-direction: column;
            gap: 10px;
        }
        
        .url-field {
            width: 100%;
        }
        
        .url-item button {
            margin-top: 0;
            width: 100%;
        }
    }
    
    /* Print styles */
    @media print {
        .skip-link,
        button {
            display: none;
        }
    }
</style>
</html>
